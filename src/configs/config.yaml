defaults:
  - data: default
  - model: cnn_baseline
  - optuna: default
  - _self_

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}_${experiment.name}
  job:
    chdir: true

experiment:
  name: "${model.name}"
  family: "${model.name}"
  tag: ""

train:
  seed: 42
  batch_size: 32
  epochs: 30
  learning_rate: 0.0001
  weight_decay: 0.0
  k_folds: 5
  folds_to_run: null
  early_stopping: 10
  device: "auto"
  num_workers: 0
  objective_metric: "f1_macro"
  save_best_to_root: true

inference:
  audio_path: ???
  model_checkpoint: ???
  output_dir: "inference_outputs"
