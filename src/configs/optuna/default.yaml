enabled: false
study_name: "${experiment.family}_optuna"
storage: "sqlite:///optuna_studies/${experiment.family}_optuna.db"
direction: "maximize"
trials: 20  # Target number of COMPLETE trials; PRUNED/FAIL are not counted.
timeout: null
sampler_seed: 42
pruner:
  warmup_steps: 5
parallel_workers: 1
trials_per_worker: 10
metric: "f1_macro"
visualization:
  save_html: true
  save_png: false
  png_scale: 3
trial_overrides:
  train:
    folds_to_run: 1
search_space:
  cnn:
    min_blocks: 3
    max_blocks: 6
    channel_choices: [32, 64, 96, 128, 160, 192, 256, 384, 512]
    dropout_min: 0.1
    dropout_max: 0.5
  transformer:
    patch_size_choices: [8, 16, 32]
    patch_stride_choices: [8, 16]
    embed_dim_choices: [128, 192, 256]
    num_layers_min: 2
    num_layers_max: 6
    num_heads_choices: [4, 8]
    ffn_ratio_choices: [2, 4]
    pooling_choices: ["attention", "mean", "cls"]
    dropout_min: 0.1
    dropout_max: 0.4
  cnn_conformer:
    stem_channel_choices: [32, 48, 64, 96]
    embed_dim_choices: [128, 192, 256]
    num_layers_min: 2
    num_layers_max: 5
    num_heads_choices: [4, 8]
    ffn_ratio_choices: [2, 4]
    conv_kernel_choices: [7, 15, 31]
    pooling_choices: ["attention", "mean"]
    dropout_min: 0.1
    dropout_max: 0.4
  multiscale:
    fine_patch_choices: [4, 8]
    coarse_patch_choices: [12, 16, 24]
    embed_dim_choices: [128, 192, 256]
    num_layers_min: 2
    num_layers_max: 4
    num_heads_choices: [4, 8]
    ffn_ratio_choices: [2, 4]
    pooling_choices: ["attention", "mean"]
    dropout_min: 0.1
    dropout_max: 0.4
  train:
    lr_min: 1.0e-4
    lr_max: 3.0e-3
    weight_decay_min: 1.0e-6
    weight_decay_max: 1.0e-3
    batch_choices: [16, 32, 64]
  logmel:
    n_mels_choices: [64, 80, 96, 128, 160]
    n_fft_choices: [512, 1024, 2048]
    hop_length_choices: [160, 256, 320, 512]
    normalize_choices: [true, false]
    resize_height_choices: [64, 96, 128, 160]
    resize_width_choices: [256, 384, 512, 640]
    f_min_choices: [0.0, 20.0, 50.0]
    f_max_choices: [4000.0, 6000.0, 7000.0, 8000.0]
