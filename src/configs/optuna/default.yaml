enabled: false
study_name: "cnn_logmel_baseline"
storage: "sqlite:///optuna_studies/cnn_logmel_baseline.db"
direction: "maximize"
trials: 20
timeout: null
sampler_seed: 42
pruner:
  warmup_steps: 5
parallel_workers: 1
trials_per_worker: 10
metric: "f1_macro"
search_space:
  cnn:
    min_blocks: 3
    max_blocks: 6
    channel_choices: [32, 64, 96, 128, 160, 192, 256, 384, 512]
    dropout_min: 0.1
    dropout_max: 0.5
  train:
    lr_min: 1.0e-4
    lr_max: 3.0e-3
    weight_decay_min: 1.0e-6
    weight_decay_max: 1.0e-3
    batch_choices: [16, 32, 64]
  logmel:
    duration_choices: [2.0, 2.5, 3.0, 3.5, 4.0]
    n_mels_choices: [64, 80, 96, 128, 160]
    n_fft_choices: [512, 1024, 2048]
    hop_length_choices: [160, 256, 320, 512]
    normalize_choices: [true, false]
    resize_height_choices: [64, 96, 128, 160]
    resize_width_choices: [256, 384, 512, 640]
